name: MarsEdit
options:
  bundleIdPrefix: com.marsedit
  deploymentTarget:
    macOS: "13.0"

packages:
  swift-markdown:
    url: https://github.com/apple/swift-markdown.git
    from: "0.4.0"

targets:
  MarsEdit:
    type: application
    platform: macOS
    sources:
      - path: MarsEdit
        excludes:
          - "Resources/**"
          - "Assets.xcassets"
      - path: MarsEdit/Resources/Themes
        type: folder
        buildPhase: resources
      - path: MarsEdit/Resources/AppIcon.icon
        buildPhase: resources
      - path: MarsEdit/Resources/mars
        buildPhase: resources
      - path: MarsEdit/Assets.xcassets
    dependencies:
      - package: swift-markdown
        product: Markdown
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: MarsEdit/Info.plist
        CODE_SIGN_ENTITLEMENTS: MarsEdit/MarsEdit.entitlements
        ENABLE_HARDENED_RUNTIME: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.marsedit.app
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_NAME: Yanmo
        PRODUCT_MODULE_NAME: MarsEdit
    entitlements:
      path: MarsEdit/MarsEdit.entitlements

  MarsEditTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MarsEditTests
    dependencies:
      - target: MarsEdit
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Yanmo.app/Contents/MacOS/Yanmo"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  MarsEdit:
    build:
      targets:
        MarsEdit: all
        MarsEditTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MarsEditTests
    archive:
      config: Release
