name: Yanmo
options:
  bundleIdPrefix: com.yanmo
  deploymentTarget:
    macOS: "13.0"

packages:
  swift-markdown:
    url: https://github.com/apple/swift-markdown.git
    from: "0.4.0"

targets:
  Yanmo:
    type: application
    platform: macOS
    sources:
      - path: Yanmo
        excludes:
          - "Resources/**"
          - "Assets.xcassets"
      - path: Yanmo/Resources/Themes
        type: folder
        buildPhase: resources
      - path: Yanmo/Resources/Templates
        type: folder
        buildPhase: resources
      - path: Yanmo/Resources/AppIcon.icon
        buildPhase: resources
      - path: Yanmo/Resources/yanmo
        buildPhase: resources
      - path: Yanmo/Assets.xcassets
    dependencies:
      - package: swift-markdown
        product: Markdown
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Yanmo/Info.plist
        CODE_SIGN_ENTITLEMENTS: Yanmo/Yanmo.entitlements
        ENABLE_HARDENED_RUNTIME: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.yanmo.app
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_NAME: Yanmo
        PRODUCT_MODULE_NAME: Yanmo
    entitlements:
      path: Yanmo/Yanmo.entitlements

  YanmoTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: YanmoTests
    dependencies:
      - target: Yanmo
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Yanmo.app/Contents/MacOS/Yanmo"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Yanmo:
    build:
      targets:
        Yanmo: all
        YanmoTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - YanmoTests
    archive:
      config: Release
